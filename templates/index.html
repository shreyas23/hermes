<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hermes</title>
  <link rel="stylesheet" href="/static/css/tokens.css">
  <script>
    const t = localStorage.getItem('hermes-theme')
      || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', t);
    window.__DEFAULT_DESIGN = '{{ default_design }}';
    const d = localStorage.getItem('hermes-design') || window.__DEFAULT_DESIGN;
    document.documentElement.setAttribute('data-design', d);
  </script>
  <link rel="stylesheet" href="/static/css/layout.css">
  <link rel="stylesheet" href="/static/css/components.css">
  <link rel="stylesheet" href="/static/css/designs.css">
</head>
<body>
  <div class="app" id="app">
    <aside class="sidebar">
      <div class="sidebar__header">
        <h1 class="sidebar__title">Hermes</h1>
        <div class="sidebar__actions">
          <button class="sidebar__add" id="btn-discover" title="Discover articles">
            <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
              <circle cx="7" cy="7" r="4.5"/><line x1="10.5" y1="10.5" x2="14" y2="14"/>
            </svg>
          </button>
          <button class="sidebar__add" id="btn-add" title="Import">+</button>
        </div>
      </div>

      <div class="sidebar__search">
        <input type="text" class="sidebar__search-input" id="search-input" placeholder="Search library...">
      </div>

      <nav class="nav" role="navigation" aria-label="Library">
        <button class="nav__item is-active" data-view="recent">Recent</button>
        <button class="nav__item" data-view="in_progress">In Progress</button>
        <div class="nav__section">Sources</div>
        <button class="nav__item" data-view="articles">Articles</button>
        <button class="nav__item" data-view="documents">Documents</button>
        <button class="nav__item" data-view="texts">Text</button>
        <div class="nav__section">
          Collections
          <button class="nav__section-btn" id="btn-new-collection" title="New collection">+</button>
        </div>
        <div id="collections-list"></div>
      </nav>

      <div class="item-list" id="item-list"></div>

      <div class="sidebar__footer">
        <button class="sidebar__icon-btn" id="btn-settings" title="Settings">&#x2699;</button>
        <button class="sidebar__theme-toggle" id="btn-theme" title="Toggle dark mode">
          <span class="sidebar__theme-icon" id="theme-icon">&#x263E;</span>
        </button>
      </div>
    </aside>

    <main class="main">
      <div class="empty-state" id="empty-state">
        <p class="empty-state__text">Import a file, paste a URL, or add text to start listening</p>
      </div>

      <div class="player-state" id="player-state">
        <div class="reader" id="reader-view">
          <button class="reader__toc-btn is-hidden" id="btn-toc" title="Table of Contents">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
              <line x1="5" y1="3" x2="14" y2="3"/><line x1="5" y1="8" x2="14" y2="8"/><line x1="5" y1="13" x2="14" y2="13"/>
              <circle cx="2" cy="3" r="1" fill="currentColor" stroke="none"/><circle cx="2" cy="8" r="1" fill="currentColor" stroke="none"/><circle cx="2" cy="13" r="1" fill="currentColor" stroke="none"/>
            </svg>
          </button>
          <div class="reader__toc is-hidden" id="reader-toc"></div>
          <div class="reader__scroll" id="reader-content"></div>
          <button class="reader__follow" id="btn-follow">&#x2193; Now playing</button>
        </div>

        <div class="controls">
          <div class="controls__transport">
            <button class="controls__btn controls__btn--speed" id="btn-speed" title="Playback speed">1x</button>
            <button class="controls__btn controls__btn--skip" id="btn-back15" title="Back 15s">&minus;15</button>
            <div class="controls__transport-core">
              <button class="controls__btn" id="btn-prev" title="Previous">&#x23EE;</button>
              <button class="controls__btn controls__btn--play" id="btn-play" title="Play">&#x25B6;</button>
              <button class="controls__btn controls__btn--play is-hidden" id="btn-pause" title="Pause">&#x23F8;</button>
              <button class="controls__btn" id="btn-next" title="Next">&#x23ED;</button>
            </div>
            <button class="controls__btn controls__btn--skip" id="btn-fwd15" title="Forward 15s">+15</button>
          </div>
          <div class="controls__progress">
            <span class="controls__time" id="time-current">0:00</span>
            <input type="range" class="controls__scrubber" id="scrubber" min="0" max="10000" value="0" step="1">
            <span class="controls__time controls__time--end" id="time-total">0:00</span>
          </div>
          <div class="controls__status">
            <span id="status-text"></span>
          </div>
        </div>

        <div class="audio-gen is-hidden" id="audio-gen">
          <button class="audio-gen__action" id="audio-gen-action">Generate audio</button>
          <div class="audio-gen__progress is-hidden" id="audio-gen-progress">
            <div class="audio-gen__track"><div class="audio-gen__fill" id="audio-gen-fill"></div></div>
            <span class="audio-gen__pct" id="audio-gen-pct">0%</span>
            <button class="audio-gen__cancel" id="audio-gen-cancel">Cancel</button>
          </div>
          <div class="audio-gen__note" id="audio-gen-note"></div>
        </div>
      </div>
    </main>
  </div>

  <div class="modal-backdrop" id="import-modal">
    <div class="modal-backdrop__click-target" id="import-backdrop"></div>
    <div class="modal" role="dialog" aria-label="Import">
      <button class="modal__close" title="Close" aria-label="Close">&times;</button>
      <h2 class="modal__title">Import</h2>
      <div class="modal__tabs">
        <button class="modal__tab is-active" data-tab="url">URL</button>
        <button class="modal__tab" data-tab="file">File</button>
        <button class="modal__tab" data-tab="folder">Folder</button>
        <button class="modal__tab" data-tab="text">Text</button>
      </div>

      <div class="modal__pane is-active" id="pane-url">
        <input type="text" class="modal__input" id="import-url" placeholder="https://example.com/article">
        <button class="modal__submit" id="import-url-btn">Import Article</button>
      </div>

      <div class="modal__pane" id="pane-file">
        <input type="text" class="modal__input" id="import-file-path" placeholder="/path/to/document.pdf">
        <button class="modal__submit" id="import-file-btn">Import File</button>
      </div>

      <div class="modal__pane" id="pane-folder">
        <input type="text" class="modal__input" id="import-folder-path" placeholder="~/Documents">
        <button class="modal__submit" id="import-folder-scan-btn">Scan Folder</button>
        <div class="folder-results" id="folder-scan-results"></div>
      </div>

      <div class="modal__pane" id="pane-text">
        <input type="text" class="modal__input" id="import-text-title" placeholder="Title">
        <textarea class="modal__input modal__input--textarea" id="import-text-content" placeholder="Paste your text here..."></textarea>
        <button class="modal__submit" id="import-text-btn">Import Text</button>
      </div>

      <button class="modal__cancel" id="import-close">Cancel</button>
    </div>
  </div>

  <div class="modal-backdrop" id="discover-modal">
    <div class="modal-backdrop__click-target" id="discover-backdrop"></div>
    <div class="modal modal--wide" role="dialog" aria-label="Discover">
      <button class="modal__close" title="Close" aria-label="Close">&times;</button>
      <h2 class="modal__title">Discover</h2>
      <div class="modal__tabs">
        <button class="modal__tab is-active" data-tab="search">Search</button>
        <button class="modal__tab" data-tab="feeds">Feeds</button>
      </div>

      <div class="modal__pane is-active" id="discover-pane-search">
        <div class="discover__bar">
          <input type="text" class="modal__input discover__bar-input" id="discover-search-input" placeholder="Search Wikipedia…">
          <button class="modal__submit" id="discover-search-btn">Search</button>
        </div>
        <div class="discover__results" id="discover-search-results"></div>
      </div>

      <div class="modal__pane" id="discover-pane-feeds">
        <div class="discover__bar">
          <input type="text" class="modal__input discover__bar-input" id="discover-feed-input" placeholder="Add RSS or Substack feed URL…">
          <button class="modal__submit" id="discover-feed-add-btn">Subscribe</button>
        </div>
        <div class="discover__feeds" id="discover-feed-list"></div>
        <div class="discover__section-label">Latest</div>
        <div class="discover__results" id="discover-feed-entries"></div>
      </div>

      <div class="modal__actions">
        <button class="modal__cancel" id="discover-close">Cancel</button>
        <button class="modal__submit" id="discover-done">Done</button>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="settings-modal">
    <div id="settings-backdrop" style="position:absolute;inset:0"></div>
    <div class="modal" role="dialog" aria-label="Settings" style="position:relative;z-index:1">
      <button class="modal__close" title="Close" aria-label="Close">&times;</button>
      <h2 class="modal__title">Settings</h2>

      <div class="settings-group">
        <label class="settings-label" for="setting-design">Design</label>
        <select class="settings-select" id="setting-design">
          <option value="glass">Glass</option>
          <option value="aurora">Soft Aurora</option>
          <option value="ink">Ink &amp; Paper</option>
        </select>
      </div>

      <div class="settings-group">
        <label class="settings-label" for="setting-engine">TTS Engine</label>
        <select class="settings-select" id="setting-engine">
          <option value="edge">Edge TTS (online, faster)</option>
          <option value="say">macOS Say (offline)</option>
        </select>
      </div>

      <div class="settings-group" id="edge-voice-group">
        <label class="settings-label" for="setting-edge-voice">Edge Voice</label>
        <select class="settings-select" id="setting-edge-voice"></select>
      </div>

      <div class="settings-group is-hidden" id="say-voice-group">
        <label class="settings-label" for="setting-say-voice">macOS Voice</label>
        <select class="settings-select" id="setting-say-voice"></select>
      </div>

      <button class="modal__submit" id="settings-save">Save</button>
      <button class="modal__cancel" id="settings-close">Cancel</button>
    </div>
  </div>

  <div class="modal-backdrop" id="confirm-modal">
    <div class="modal-backdrop__click-target" id="confirm-backdrop"></div>
    <div class="modal modal--narrow" role="dialog" aria-label="Confirm">
      <h2 class="modal__title" id="confirm-title">Are you sure?</h2>
      <p class="confirm__message" id="confirm-message"></p>
      <button class="modal__submit modal__submit--destructive" id="confirm-ok">Delete</button>
      <button class="modal__cancel" id="confirm-cancel">Cancel</button>
    </div>
  </div>

  <div class="context-menu" id="context-menu"></div>
  <div class="toast-container" id="toast-container"></div>

  <script type="module" src="/static/js/app.js"></script>
</body>
</html>
