name: Build macOS DMG

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    env:
      VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync

      - name: Set version in spec
        run: |
          sed -i '' "s/'CFBundleVersion': '.*'/'CFBundleVersion': '${VERSION#v}'/" hermes.spec
          sed -i '' "s/'CFBundleShortVersionString': '.*'/'CFBundleShortVersionString': '${VERSION#v}'/" hermes.spec

      - name: Build app bundle
        run: uv run pyinstaller hermes.spec --noconfirm

      - name: Ad-hoc codesign
        run: codesign --force --deep --sign - dist/Hermes.app

      - name: Create DMG
        run: |
          mkdir -p dist/dmg
          cp -R dist/Hermes.app dist/dmg/
          ln -s /Applications dist/dmg/Applications
          hdiutil create -volname "Hermes" -srcfolder dist/dmg -ov -format UDZO "dist/Hermes-${VERSION}-mac.dmg"

      - name: Generate checksum
        run: shasum -a 256 "dist/Hermes-${VERSION}-mac.dmg" > "dist/Hermes-${VERSION}-mac.dmg.sha256"

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        run: gh release upload "$VERSION" "dist/Hermes-${VERSION}-mac.dmg" "dist/Hermes-${VERSION}-mac.dmg.sha256" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
