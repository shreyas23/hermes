name: Build macOS DMG

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    env:
      VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync

      - name: Set version in spec
        run: |
          sed -i '' "s/'CFBundleVersion': '.*'/'CFBundleVersion': '${VERSION#v}'/" hermes.spec
          sed -i '' "s/'CFBundleShortVersionString': '.*'/'CFBundleShortVersionString': '${VERSION#v}'/" hermes.spec

      - name: Build app bundle
        run: uv run pyinstaller hermes.spec --noconfirm

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          create-dmg \
            --volname "Hermes" \
            --window-size 600 400 \
            --icon "Hermes.app" 150 200 \
            --app-drop-link 450 200 \
            --format UDZO \
            "dist/Hermes-${VERSION}-mac.dmg" \
            dist/Hermes.app

      - name: Generate checksum
        run: shasum -a 256 "dist/Hermes-${VERSION}-mac.dmg" > "dist/Hermes-${VERSION}-mac.dmg.sha256"

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        run: gh release upload "$VERSION" "dist/Hermes-${VERSION}-mac.dmg" "dist/Hermes-${VERSION}-mac.dmg.sha256" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
